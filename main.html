<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>offlineStore | متجر اوفلاين</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f4f4; padding-bottom: 50px; }
        

        nav { 
            background: #000; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { 
            color: #fff; font-size: 24px; font-weight: bold; text-transform: lowercase;
            text-shadow: 0 0 5px #fff; order: 2;
        }
        .nav-info { display: flex; gap: 15px; align-items: center; order: 1; }
        .whatsapp-btn { 
            background: transparent; color: #25d366; border: 2px solid #25d366; 
            padding: 8px 15px; text-decoration: none; border-radius: 5px; font-weight: bold;
        }


        .container { 
            padding: 40px 0; max-width: 600px; margin: 0 auto; 
        }
        .card { 
            background: #fff; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin-bottom: 20px; text-align: center;
            cursor: pointer;
        }
        
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; pointer-events: none; }
        
        .details { 
            display: none; margin-top: 20px; padding: 15px; 
            background: #fdfdfd; border: 1px dashed #ccc; border-radius: 10px;
        }
        .details-grid { display: flex; justify-content: space-around; margin-top: 10px; font-weight: bold; }
        .price-tag { color: #d32f2f; font-size: 1.3em; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">offline</div>
        <div class="nav-info">
            <span style="color: #fff;">مصر</span>
            <a href="https://wa.me/201111111111" class="whatsapp-btn">واتساب</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" onclick="toggleDetails(1)">
            <h3>منتج 1</h3>
            <img src="Images/1-1.jpg" alt="صورة 1">
            <div id="details-1" class="details">
                <div class="details-grid">
                    <span class="price-tag">150 جنيه</span>
                    <span>الستوك: متوفر</span>
                </div>
                <div style="margin-top: 15px;">
                    <img src="Images/1-2.jpg" alt="صورة إضافية" style="width:100px; height:100px; border:1px solid #ddd;">
                </div>
            </div>
        </div>

        <div class="card" onclick="toggleDetails(2)">
            <h3>منتج 2</h3>
            <img src="2-1.jpg" alt="صورة 2">
            <div id="details-2" class="details">
                <div class="details-grid">
                    <span class="price-tag">150 جنيه</span>
                    <span>الستوك: متوفر</span>
                </div>
                <div style="margin-top: 15px;">
                    <img src="2-2.jpg" alt="صورة إضافية" style="width:100px; height:100px; border:1px solid #ddd;">
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDetails(id) {
            var el = document.getElementById('details-' + id);
            if (el) {
                el.style.display = (el.style.display === "block") ? "none" : "block";
            } else {
                console.log("المنتج رقم " + id + " مش موجود!");
            }
        }
    </script>
</body>
</html>
