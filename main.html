<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>offlineStore | متجر اوفلاين</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f4f4; padding-bottom: 50px; }
        
        nav { background: #000; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 24px; font-weight: bold; text-transform: lowercase; text-shadow: 0 0 5px #fff; order: 2; }
        .nav-info { display: flex; gap: 15px; align-items: center; order: 1; }
        .whatsapp-btn { background: transparent; color: #25d366; border: 2px solid #25d366; padding: 8px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }

        .container { padding: 40px 0; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        
        .card > img { width: 100%; height: auto; border-radius: 10px; cursor: pointer; }
        
        .details { display: none; margin-top: 20px; padding: 15px; background: #fdfdfd; border: 1px dashed #ccc; border-radius: 10px; position: relative; }
        .close-btn { position: absolute; top: 5px; left: 10px; cursor: pointer; font-size: 20px; font-weight: bold; }
        
        .details-grid { display: flex; justify-content: space-around; margin: 15px 0; font-weight: bold; }
        .price-tag { color: #d32f2f; font-size: 1.3em; }
        
        .extra-img { width: 100%; height: auto; border-radius: 5px; cursor: zoom-in; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">offline</div>
        <div class="nav-info">
            <span style="color: #fff;">مصر</span>
            <a href="https://wa.me/201111111111" class="whatsapp-btn">واتساب</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3>منتج 1</h3>
            <img src="Images/1-1.jpeg" alt="صورة 1" onclick="toggleDetails(1)">
            
            <div id="details-1" class="details">
                <span class="close-btn" onclick="toggleDetails(1)">×</span>
                <div class="details-grid">
                    <span class="price-tag">150 جنيه</span>
                    <span>القطع: 1</span>
                </div>
                <img src="Images/1-2.jpeg" class="extra-img" onclick="fullScreen(this)">
            </div>
        </div>
    </div>

    <script>
        function toggleDetails(id) {
            var el = document.getElementById('details-' + id);
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }

        function fullScreen(imgElement) {
            if (!document.fullscreenElement) {
                imgElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
