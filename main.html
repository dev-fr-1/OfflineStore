<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>offline | متجر</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header { width: 100%; max-width: 500px; padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .whatsapp { border: 1px solid #25d366; color: #25d366; padding: 6px 15px; border-radius: 5px; text-decoration: none; font-size: 14px; }

        .container { width: 100%; max-width: 400px; padding: 20px; }
        .product { background: #111; border-radius: 15px; padding: 15px; text-align: center; }
        .product img { width: 100%; max-height: 300px; object-fit: contain; background: #000; border-radius: 10px; }
        
        .info { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">offline</div>
        <a href="https://wa.me/201111111111" class="whatsapp">واتساب</a>
    </header>

    <div class="container">
        <div class="product">
            <img src="Images/1-1.jpeg" alt="product">
            <div class="info">
                <span>منتج 1</span>
                <button class="btn" onclick="showDetails()">التفاصيل</button>
            </div>
        </div>
    </div>

    <script>
        function showDetails() {
            document.write(`
                <body style="background:#000; color:#fff; display:flex; flex-direction:column; align-items:center; padding:20px; font-family:sans-serif;">
                    <div style="width:100%; max-width:400px;">
                        <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:8px 15px; border-radius:5px; cursor:pointer;">رجوع</button>
                        <div style="margin-top:20px; background:#111; padding:15px; border-radius:15px;">
                            <img src="Images/1-1.jpeg" style="width:100%; height:auto; object-fit:contain; border-radius:10px;">
                            <h2 style="margin:15px 0;">منتج 1</h2>
                            <p style="color:#d4af37; font-size:18px;">السعر: 150 جنيه</p>
                            <p style="margin:10px 0;">القطع: 1</p>
                            <img src="Images/1-2.jpeg" style="width:100%; height:auto; border-radius:10px; margin-top:10px;">
                        </div>
                    </div>
                </body>
            `);
        }
    </script>
</body>
</html>
